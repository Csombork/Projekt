<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="museum.css">
<title>Lapozható idővonal</title>
</head>
<body>

<div class="book">

    <div class="page active">

        <div class="left">
            <div class="year">2024</div>
            <div class="subtitle">100 éves jubileum</div>

            <div class="text">
                Iskolánk fennállásának századik évfordulóját ünnepli.
                Egy évszázad története, sikerei és közössége.
            </div>
        </div>

        <div class="right">
            <div class="image"
            style="background-image:url('https://picsum.photos/id/1040/900/600')">
            </div>
        </div>

    </div>

    <div class="page hidden">

        <div class="left">
            <div class="year">1980</div>
            <div class="subtitle">Fejlődés időszaka</div>

            <div class="text">
                Új tantermek, új lehetőségek,
                bővülő közösség.
            </div>
        </div>

        <div class="right">
            <div class="image"
            style="background-image:url('https://picsum.photos/id/1067/900/600')">
            </div>
        </div>

    </div>

    <div class="page hidden">

        <div class="left">
            <div class="year">1924</div>
            <div class="subtitle">Az alapítás éve</div>

            <div class="text">
                Az első épület és az első tanulók.
                Innen kezdődött a történet.
            </div>
        </div>

        <div class="right">
            <div class="image"
            style="background-image:url('https://picsum.photos/id/1050/900/600')">
            </div>
        </div>

    </div>

    <div class="spiral"></div>

    <div class="controls">
        <button class="btn" id="up">▲</button>
        <button class="btn" id="down">▼</button>
    </div>

    <div class="timeline">
        <span>2024</span>
        <span>1980</span>
        <span>1924</span>
    </div>

</div>

<script src="museum.js"></script>

</body>
</html>
